<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Review Answers</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
 
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    @media print {
    .no-print {
        display: none;
    }
}

body {
    background: linear-gradient(135deg, #427ff0, #50eca3);
    min-height: 100vh;
    padding: 40px 0;
    font-family: 'Segoe UI', sans-serif;
}

.glass-card {
    background: #ffffff;
    border-radius: 20px;
    padding: 40px;
    max-width: 900px;
    margin: auto;
    box-shadow: 0 15px 40px rgba(0,0,0,0.15);
}

.question-box {
    background: #f8f9fa;
    border-radius: 15px;
    padding: 20px;
    margin-bottom: 25px;
    border-left: 5px solid #427ff0;
}

.option-item {
    padding: 10px 15px;
    border-radius: 8px;
    margin-bottom: 8px;
}

.correct {
    background-color: #d4edda;
    border-left: 4px solid #28a745;
    font-weight: 600;
}

.wrong {
    background-color: #f8d7da;
    border-left: 4px solid #dc3545;
    font-weight: 600;
}

.not-answered {
    color: #ff9800;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="glass-card">
<h2 class="text-center mb-4">Review Answers</h2>
<hr>

{% for ans in answers %}
<div class="question-box">

    <p class="fw-bold">
        Q{{ loop.index }}: {{ ans.question }}
    </p>

    {% if not ans.answer %}
        <p class="not-answered">⚠ Not Answered</p>
    {% endif %}

    <!-- OPTION A -->
    <div class="option-item
        {% if ans.correct_option == 'A' %} correct
        {% elif ans.answer == 'A' %} wrong
        {% endif %}">
        A - {{ ans.option_a }}
    </div>

    <!-- OPTION B -->
    <div class="option-item
        {% if ans.correct_option == 'B' %} correct
        {% elif ans.answer == 'B' %} wrong
        {% endif %}">
        B - {{ ans.option_b }}
    </div>

    <!-- OPTION C -->
    <div class="option-item
        {% if ans.correct_option == 'C' %} correct
        {% elif ans.answer == 'C' %} wrong
        {% endif %}">
        C - {{ ans.option_c }}
    </div>

    <!-- OPTION D -->
    <div class="option-item
        {% if ans.correct_option == 'D' %} correct
        {% elif ans.answer == 'D' %} wrong
        {% endif %}">
        D - {{ ans.option_d }}
    </div>

</div>
{% endfor %}
<div class="text-center mt-4 no-print">

    <button onclick="window.print()" 
            class="btn btn-dark px-4 me-2">
        🖨 Print
    </button>

</div>

<div class="text-center mt-4">
    <a href="{{ url_for('logout') }}" class="btn btn-primary px-5">
        Logout
    </a>
</div>

</div>
</body>
</html>
